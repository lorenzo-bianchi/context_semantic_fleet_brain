services:
  robot-dev:
    build:
      context: .
      dockerfile: Dockerfile

    depends_on:
      - postgres
      - qdrant

    network_mode: host
    ipc: host

    privileged: true

    env_file:
      - ../.env

    environment:
      - DISPLAY=${DISPLAY}

    volumes:
      - ..:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /dev:/dev
      - ./zsh_history:/home/zero/zsh_history
      - uv_cache:/home/zero/.cache/uv
      - uv_python:/home/zero/.local/share/uv

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    command: sleep infinity

  postgres:
    image: postgres:15
    container_name: fleet_postgres
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: fleet_admin
      POSTGRES_DB: fleet_brain
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    container_name: fleet_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage:z

  redis:
    image: redis:alpine
    container_name: fleet_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pg_data:
  uv_cache:
  uv_python:
