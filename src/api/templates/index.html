<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Fleet Brain - Ground Control Station</title>
    <style>
        /* CSS Variables for theme management */
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --terminal-bg: #1e1e1e;
            --terminal-text: #4EC9B0;
            --btn-text: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333333;
            --terminal-bg: #000000;
            --terminal-text: #00ff00;
            --shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h2 { margin: 0; color: #1a73e8; display: flex; align-items: center; gap: 10px; }
        [data-theme="dark"] h2 { color: #64b5f6; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .panel {
            background-color: var(--container-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 4/3;
            background-color: #000;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            color: #666;
            margin-bottom: 0;
            border: 2px solid var(--border-color);
            flex-grow: 1;
        }

        .video-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 1;
        }

        #streamStatus {
            position: absolute;
            z-index: 0;
            text-align: center;
            padding: 20px;
        }

        .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }

        input[type="text"], input[type="file"] {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }

        button {
            padding: 10px 15px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            color: var(--btn-text);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        button:hover { opacity: 0.8; }
        button:active { transform: scale(0.98); }

        .btn-primary { background-color: #1a73e8; }
        .btn-secondary { background-color: #607d8b; }
        .btn-danger { background-color: #e53935; }
        .btn-warning { background-color: #ff9800; color: #000; }
        .btn-gemini { background-color: #8e44ad; }
        .btn-ollama { background-color: #e67e22; }

        .output-area {
            background-color: var(--terminal-bg);
            color: var(--terminal-text);
            padding: 15px;
            border-radius: 6px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            border: 1px solid var(--border-color);
            flex-grow: 1;
        }
        .log-time { color: #888; margin-right: 8px; }
    </style>
</head>

<body>
    <div class="header-bar">
        <h2>🤖 Fleet Brain GCS</h2>
        <div class="button-group" style="margin: 0;">
            <button class="btn-secondary" onclick="toggleTheme()">🌗 Toggle Theme</button>
            <button id="llmToggleBtn" class="btn-gemini" onclick="toggleLLM()">✨ Provider: Gemini</button>
            <button class="btn-warning" onclick="resetMemory()">🧹 Wipe Memory</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel">
            <h3 style="margin-top: 0; margin-bottom: 15px;">📸 Live FPV Feed</h3>
            <div class="video-container">
                <span id="streamStatus">Stream offline. Check ROS 2 bridge.</span>
                <img id="cameraStream" alt="" src="">
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin: 0;">🖥️ AI Terminal</h3>
                    <div class="button-group" style="margin: 0;">
                        <button class="btn-secondary" style="padding: 5px 10px; font-size: 12px;" onclick="fetchHistory()">📜 History</button>
                        <button class="btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="clearConsole()">🗑️ Clear</button>
                    </div>
                </div>
                <div id="outputBox" class="output-area">Initializing connection to Fleet Brain...</div>
            </div>

            <div class="panel">
                <h3 style="margin-top: 0; margin-bottom: 15px;">🕹️ Mission Control</h3>
                <div class="input-group" style="margin-bottom: 0;">
                    <input type="text" id="instructionInput" value="Explore the room" placeholder="Enter AI Command (e.g., Go to the red box)">
                    <button class="btn-primary" onclick="sendCommand()">🚀 Dispatch</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const outputBox = document.getElementById('outputBox');
        const streamStatus = document.getElementById('streamStatus');
        let currentProvider = "gemini";

        // Restore theme preference from LocalStorage
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const imgElement = document.getElementById('cameraStream');
        const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = `${wsProtocol}//${window.location.host}/ws/video_stream`;
        let ws;

        // WebSocket connection for real-time video feed
        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                logToConsole("📡 Live video stream connected via WebSocket.");
                streamStatus.style.display = 'none';
            };

            ws.onmessage = function(event) {
                imgElement.src = "data:image/jpeg;base64," + event.data;
            };

            ws.onclose = function() {
                logToConsole("⚠️ Video stream disconnected. Reconnecting in 2s...");
                streamStatus.style.display = 'block';
                imgElement.src = "";
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = function(err) {
                ws.close();
            };
        }

        connectWebSocket();

        // Helper to output logs to the UI terminal
        function logToConsole(message, data = null) {
            const now = new Date().toLocaleTimeString();
            let logHtml = `<div style="margin-bottom: 5px;"><span class="log-time">[${now}]</span> ${message}`;
            if (data) {
                logHtml += `\n<span style="color: #64b5f6; display: block; margin-top: 4px; padding-left: 10px;">${JSON.stringify(data, null, 2)}</span>`;
            }
            logHtml += `</div>`;

            if (outputBox.innerText.includes("Initializing")) outputBox.innerHTML = "";
            outputBox.innerHTML += logHtml;
            outputBox.scrollTop = outputBox.scrollHeight;
        }

        function clearConsole() {
            outputBox.innerHTML = "Terminal cleared.\n";
        }

        // Toggle between AI providers (Gemini vs Ollama)
        async function toggleLLM() {
            currentProvider = currentProvider === "gemini" ? "ollama" : "gemini";
            const btn = document.getElementById('llmToggleBtn');

            if (currentProvider === "gemini") {
                btn.innerText = "✨ Provider: Gemini";
                btn.className = "btn-gemini";
            } else {
                btn.innerText = "🦙 Provider: Ollama";
                btn.className = "btn-ollama";
            }

            logToConsole(`⏳ Switching LLM provider to ${currentProvider.toUpperCase()}...`);

            try {
                const response = await fetch('/api/v1/llm-provider', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ provider: currentProvider })
                });

                if (response.ok) {
                    const data = await response.json();
                    logToConsole(`✅ Engine switched successfully.`);
                } else {
                    throw new Error("Backend error");
                }
            } catch (error) {
                logToConsole(`❌ Failed to switch LLM provider.`);
            }
        }

        // Reset memory via backend API
        async function resetMemory() {
            if(!confirm("Are you sure you want to wipe the spatial memory? The drone will forget all objects.")) return;

            logToConsole("⏳ Sending wipe command to Qdrant...");
            try {
                const response = await fetch('/api/v1/reset_memory', { method: 'POST' });
                const data = await response.json();
                logToConsole("🧹 Memory wiped successfully:", data);
            } catch (error) {
                logToConsole("❌ Failed to wipe memory.");
            }
        }

        // Fetch command execution history
        async function fetchHistory() {
            logToConsole("⏳ Fetching command history...");
            try {
                const response = await fetch('/api/v1/history');
                const data = await response.json();
                logToConsole("📜 Database History:", data);
            } catch (error) {
                logToConsole("⚠️ Cannot fetch history.");
            }
        }

        // Send user instruction to the robot
        async function sendCommand() {
            const instruction = document.getElementById('instructionInput').value;
            if (!instruction) return;

            logToConsole(`🚀 Dispatching: "${instruction}"`);
            const payload = { user_id: "dev_user", instruction: instruction };
            try {
                const response = await fetch('/api/v1/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                logToConsole(`✅ Received Plan:`, data);
            } catch (error) {
                logToConsole(`❌ Failed to dispatch command.`);
            }
        }

        document.getElementById('instructionInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendCommand();
        });

        const wsLogsUrl = `${wsProtocol}//${window.location.host}/ws/terminal_logs`;
        let wsLogs;

        function connectLogsWebSocket() {
            wsLogs = new WebSocket(wsLogsUrl);

            wsLogs.onopen = function() {
                logToConsole("📡 Terminal Logs connected.");
            };

            wsLogs.onmessage = function(event) {
                logToConsole(`<span style="color: #ffca28;">${event.data}</span>`);
            };

            wsLogs.onclose = function() {
                setTimeout(connectLogsWebSocket, 2000);
            };

            wsLogs.onerror = function(err) {
                wsLogs.close();
            };
        }

        connectLogsWebSocket();
    </script>
</body>
</html>
