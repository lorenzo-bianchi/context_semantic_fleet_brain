name: Semantic Fleet Brain CI (Edge/ROS2)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB: Edge (ROS2 C++ & Python compilation)
  # ==========================================
  ros2_build:
    name: Build ROS2 Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Environment
        run: |
          docker build -t semantic-fleet-brain-env -f docker/Dockerfile .

      - name: Run Colcon Build inside Container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -u $(id -u):$(id -g) \
            semantic-fleet-brain-env \
            /bin/bash -c "cd /workspace && colcon build --packages-select semantic_sim_env"