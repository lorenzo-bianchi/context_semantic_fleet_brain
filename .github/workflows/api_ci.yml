name: API CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths:   # this pipeline will start only if the following paths are modified 
      - 'src/api/**'
      - '.github/workflows/api_ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/api/**'

jobs:
  test-api:
    name: Build & Test FastAPI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/api

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: 🐍 Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 📦 Install dependencies
        run: uv sync

      - name: 🧪 Run Pytest
        run: uv run pytest tests/
